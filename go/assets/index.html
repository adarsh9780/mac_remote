<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mac Remote</title>
    <link rel="icon" href="app-icon.png">
    <link rel="apple-touch-icon" href="app-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="iphone-container">
        <!-- The notch is just a decorative element from the design -->
        <div class="notch"></div>

        <div class="header">
            <div class="brand">
                <img src="app-icon.png" alt="App Logo" class="app-icon">
                <h1 class="app-title">Mac Remote</h1>
            </div>
            <div class="header-actions">
                <button class="gear-btn" id="apps-toggle-btn" title="App Switcher">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"/>
                    </svg>
                </button>
                <button class="gear-btn" id="keyboard-toggle-btn" title="Type on Mac">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/>
                    </svg>
                </button>
                <button class="gear-btn" id="settings-toggle-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l-.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="setting-row">
                <label>Sensitivity</label>
                <input type="range" id="sensitivity-slider" min="0.5" max="5.0" step="0.1" value="2.5">
                <div class="setting-val" id="sensitivity-val">2.5</div>
            </div>
            <div class="setting-row">
                <label>Scroll Spd</label>
                <input type="range" id="scroll-speed-slider" min="0.5" max="5.0" step="0.1" value="2.0">
                <div class="setting-val" id="scroll-speed-val">2.0</div>
            </div>
        </div>

        <div class="cassette-display" id="cassette-btn" style="cursor: pointer;">
            <div class="marquee-wrapper" id="marqueeWrapper">
                <span class="marquee-text" id="cassetteText">SYSTEM STATE: Connecting...</span>
            </div>
        </div>

        <div class="control-area-wrapper">
            <div class="control-row media-row" id="media-row-container" style="display: none;">
                <button class="row-btn" data-action="media_backward">
                    <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                    <span class="btn-label">Rew</span>
                </button>
                <button class="row-btn" data-action="media_prev">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    <span class="btn-label">Prev</span>
                </button>
                <button class="row-btn play-accent" id="mainPlayBtn" data-action="media_playpause">
                    <svg id="playSvg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <span class="btn-label" id="playLbl">Play</span>
                </button>
                <button class="row-btn" data-action="media_next">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg>
                    <span class="btn-label">Next</span>
                </button>
                <button class="row-btn" data-action="media_forward">
                    <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-6l8.5 6V6l-8.5 6z"/></svg>
                    <span class="btn-label">Fwd</span>
                </button>
            </div>

            <div class="control-row sys-row">
                <div class="btn-group">
                    <button class="row-btn" data-action="brightness_down">
                        <svg viewBox="0 0 24 24"><path d="M20 15.31L23.31 12 20 8.69V4h-4.69L12 .69 8.69 4H4v4.69L.69 12 4 15.31V20h4.69L12 23.31 15.31 20H20v-4.69zM12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
                        <span class="btn-label">Bright -</span>
                    </button>
                    <div class="stat-val-badge" id="brightBadge">0</div>
                    <button class="row-btn" data-action="brightness_up">
                        <svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>
                        <span class="btn-label">Bright +</span>
                    </button>
                </div>

                <div class="btn-group">
                    <button class="row-btn" data-action="volume_down">
                        <svg viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
                        <span class="btn-label">Vol -</span>
                    </button>
                    <div class="stat-val-badge" id="volBadge">0</div>
                    <button class="row-btn" data-action="volume_up">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <span class="btn-label">Vol +</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="workspace-full">
            <div class="giant-trackpad-wide" id="trackpad-canvas">
                
                <div class="glass-scroll-btn scroll-top-right" id="scroll-up-btn">
                    <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
                </div>

                <div class="glass-scroll-btn scroll-bottom-right" id="scroll-down-btn">
                    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
                </div>

                <div class="trackpad-watermark">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <path d="M12 22v-4M9 21v-2M15 21v-2M12 14a3 3 0 0 1 3 3v1M12 14a3 3 0 0 0-3 3v1M12 10a7 7 0 0 1 7 7M5 17a7 7 0 0 1 7-7M12 6a11 11 0 0 1 11 11M1 17A11 11 0 0 1 12 6"/>
                    </svg>
                    <span style="font-size: 9px; font-weight: 500; letter-spacing: 1px;">TRACKPAD WIDE</span>
                </div>
            </div>
        </div>

        <div class="click-deck">
            <button class="click-pad" id="tp-left-click">LEFT CLICK</button>
            <button class="click-pad" id="tp-right-click">RIGHT CLICK</button>
        </div>
    </div>

    <!-- Retro Typing Modal -->
    <div class="typing-modal-overlay" id="typingModalOverlay">
        <div class="typing-modal">
            <textarea class="typing-input" id="typeInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Enter text..." rows="6"></textarea>
            <button class="typing-enter-btn" id="typingEnterBtn">SEND ENTER</button>
        </div>
    </div>

    <!-- App Switcher Modal -->
    <div class="typing-modal-overlay" id="appSwitcherModalOverlay">
        <div class="app-switcher-modal">
            <button class="dock-btn" id="showDockBtn">SHOW DOCK (Ctrl+F3)</button>
            <div class="app-grid" id="appGrid">
                <!-- Apps injected here via JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
